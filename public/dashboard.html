<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="./styles/dashboard.css" />
  </head>
  <body>
    <aside id="side-bar">
      <div class="side-bar-menu">
        <button type="button" id="tab-users" class="side-tab">Users</button>
        <button type="button" id="tab-artists" class="side-tab">Artists</button>
      </div>
      <button type="button" id="logout-button">Logout</button>
    </aside>

    <main id="dashboard-content">
      <h1 id="dashboard-title">Welcome to Dashboard</h1>
      <p id="user-info" class="user-info">Not logged in</p>

      <section id="tab-content" class="content-block">
        <p>Select a tab to load data.</p>
      </section>
    </main>

    <script src="/javascript/state.js"></script>
    <script src="/javascript/api.js"></script>
    <script src="/javascript/app.js"></script>
  </body>
</html>
